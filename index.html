  <body>
    <div id="root"></div>
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = ua.indexOf('Instagram') > -1;
        var isFacebook = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;
        var isLinkedIn = ua.indexOf('LinkedInApp') > -1;
        var isLine = ua.indexOf('Line/') > -1;
        var isWebView = ua.indexOf('wv') > -1 || ua.indexOf('WebView') > -1;
        var isInApp = isInstagram || isFacebook || isLinkedIn || isLine || isWebView;

        if (isInApp) {
          var url = window.location.href;

          if (/android/i.test(ua)) {
            // Android: intent é o mais confiável
            var intentUrl = 'intent://' + url.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
            window.location.replace(intentUrl);
            setTimeout(function() { window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(url); }, 100);
            setTimeout(function() { window.open(url, '_system'); }, 200);
            setTimeout(function() { window.open(url, '_blank'); }, 300);
          } else if (/iPhone|iPad|iPod/i.test(ua)) {
            // iOS: tenta x-safari primeiro (mais confiável no Instagram)
            window.location.replace('x-safari-' + url);
            setTimeout(function() {
              var chromeUrl = url.replace('https://', 'googlechromes://').replace('http://', 'googlechrome://');
              window.location.href = chromeUrl;
            }, 150);
            setTimeout(function() { window.open(url, '_blank'); }, 300);
          }

          // Se o redirect falhar, o site carrega normalmente no WebView
        }
      })();
    </script>
