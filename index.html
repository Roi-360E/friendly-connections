<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>EscalaXpro — Multiplique seus criativos com IA</title>
    <meta name="description" content="Transforme 1 roteiro em 100+ criativos validados. Use a lógica de concatenação dos grandes players para escalar no Facebook e TikTok Ads." />
    <meta property="og:title" content="Escalax — Escale seus anúncios" />
    <meta property="og:description" content="A ferramenta que transforma 1 roteiro em 100+ criativos validados." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Detecta navegador in-app (Instagram, Facebook, etc.) e redireciona para navegador externo
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = ua.indexOf('Instagram') > -1;
        var isFacebook = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;
        var isInApp = isInstagram || isFacebook;
        
        if (isInApp) {
          var url = window.location.href;
          // Android: intent:// abre no Chrome
          if (/android/i.test(ua)) {
            window.location.href = 'intent://' + url.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
          } 
          // iOS: tenta abrir no Safari via window.open
          else if (/iPhone|iPad|iPod/i.test(ua)) {
            // Fallback: abre em nova aba que força Safari
            window.location.href = 'x-safari-https://' + url.replace(/https?:\/\//, '');
            setTimeout(function() {
              window.location.href = url;
            }, 500);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
