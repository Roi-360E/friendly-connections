<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>EscalaXpro — Multiplique seus criativos com IA</title>
    <meta name="description" content="Transforme 1 roteiro em 100+ criativos validados. Use a lógica de concatenação dos grandes players para escalar no Facebook e TikTok Ads." />
    <meta property="og:title" content="Escalax — Escale seus anúncios" />
    <meta property="og:description" content="A ferramenta que transforma 1 roteiro em 100+ criativos validados." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      window.pixelId = "69ada3e768644e09800d0b25";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = ua.indexOf('Instagram') > -1;
        var isFacebook = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;
        var isLinkedIn = ua.indexOf('LinkedInApp') > -1;
        var isLine = ua.indexOf('Line/') > -1;
        var isWebView = ua.indexOf('wv') > -1 || ua.indexOf('WebView') > -1;
        var isInApp = isInstagram || isFacebook || isLinkedIn || isLine || isWebView;

        if (isInApp) {
          var url = window.location.href;

          if (/android/i.test(ua)) {
            // Tenta intent para Chrome
            var intentUrl = 'intent://' + url.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
            window.location.href = intentUrl;
            // Fallback: googlechrome://
            setTimeout(function() {
              window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(url);
            }, 300);
            // Fallback final: abre em nova janela
            setTimeout(function() {
              window.open(url, '_system');
            }, 600);
          } else if (/iPhone|iPad|iPod/i.test(ua)) {
            // iOS: tenta múltiplas abordagens
            // 1. googlechrome:// scheme
            var chromeUrl = url.replace('https://', 'googlechromes://').replace('http://', 'googlechrome://');
            window.location.href = chromeUrl;
            // 2. Fallback: x-safari
            setTimeout(function() {
              window.location.href = 'x-safari-' + url;
            }, 400);
            // 3. Fallback final: window.open com _blank
            setTimeout(function() {
              window.open(url, '_blank');
            }, 800);
          }

          // Esconde o conteúdo e mostra botão manual como último recurso
          setTimeout(function() {
            var root = document.getElementById('root');
            if (root && document.visibilityState !== 'hidden') {
              root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;color:#fff;padding:24px;text-align:center;font-family:sans-serif;">' +
                '<p style="font-size:18px;margin-bottom:24px;">Para a melhor experiência, abra no navegador:</p>' +
                '<a href="' + url + '" target="_blank" rel="noopener" style="display:inline-block;padding:16px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:16px;font-weight:bold;text-decoration:none;">ABRIR NO NAVEGADOR</a>' +
                '<p style="font-size:13px;margin-top:16px;color:#888;">Toque nos 3 pontos (⋮) acima e selecione "Abrir no Chrome"</p>' +
              '</div>';
            }
          }, 1200);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
